name: Nightly data refresh

# Pulls fresh Google Trends data, refits the 30-day Prophet forecasts, regenerates
# insights and the Hype Index payload (web/data.json), commits the updated data
# store, and redeploys the site — every night, unattended.
#
# NB: this workflow deploys Pages itself (last two steps) because pushes made
# with the default GITHUB_TOKEN do not trigger other workflows (pages.yml).

on:
  schedule:
    - cron: "23 9 * * *"   # 09:23 UTC daily ≈ 5:23am ET
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/refresh.yml"   # self-test when the workflow changes

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Live-source credentials (repo secrets). Each stage below activates only
      # when its keys are present, so the workflow runs fine with none set.
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TUMBLR_API_KEY: ${{ secrets.TUMBLR_API_KEY }}
      # Scale guard: refresh at most N (stalest-first) models per nightly run,
      # so the catalog can grow without Google Trends rate-limit bursts.
      TRENDS_MAX_PER_RUN: "60"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pipeline deps (no torch/OpenAI needed)
        run: pip install pandas numpy pytrends tenacity python-dotenv prophet praw

      - name: Ensure schema
        run: python -m scripts.init_db

      - name: Ingest Google Trends (real data; tolerate rate-limit nights)
        id: trends
        continue-on-error: true
        run: python -m scripts.run_pipeline --trends

      - name: Ingest Reddit chatter (live once REDDIT_* secrets are set)
        id: reddit
        if: env.REDDIT_CLIENT_ID != ''
        continue-on-error: true
        run: python -m scripts.run_pipeline --reddit

      - name: Ingest social + community (Bluesky keyless; YouTube with key)
        id: social
        continue-on-error: true
        run: python -m scripts.run_pipeline --social

      - name: Ingest Wikipedia attention
        id: wiki
        continue-on-error: true
        run: python -m scripts.run_pipeline --wiki

      - name: Ingest sneaker press coverage (Google News + blog RSS, keyless)
        id: press
        continue-on-error: true
        run: python -m scripts.run_pipeline --press

      - name: Ingest boutique availability (best-effort)
        id: boutiques
        continue-on-error: true
        run: python -m scripts.run_pipeline --boutiques

      - name: Score sentiment (lexicon fallback — no torch in CI)
        id: sentiment
        continue-on-error: true
        run: python -m scripts.run_pipeline --sentiment

      - name: Ingest eBay resale (live once EBAY_* secrets are set)
        id: resale
        if: env.EBAY_CLIENT_ID != ''
        continue-on-error: true
        run: python -m scripts.run_pipeline --resale

      - name: Refit Prophet forecasts
        id: forecast
        continue-on-error: true
        run: python -m scripts.run_pipeline --forecast

      - name: Regenerate insights (offline rule engine)
        run: python -m scripts.run_pipeline --offline-insights

      - name: Rebuild site payload
        run: python -m scripts.build_site

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/solesight.db web/data.json
          if git diff --cached --quiet; then
            echo "No data changes tonight."
          else
            git commit -m "chore: nightly data refresh"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      # continue-on-error above means a stage crashing outright never fails this
      # job, so GitHub's own "workflow failed" email never fires either — this
      # step is the only thing standing between a broken adapter and nobody
      # noticing. Zero new infra: it just files/updates a GitHub issue, which
      # already emails the repo watchers.
      - name: Report pipeline health
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          declare -A OUTCOMES=(
            [trends]="${{ steps.trends.outcome }}"
            [reddit]="${{ steps.reddit.outcome }}"
            [social]="${{ steps.social.outcome }}"
            [wiki]="${{ steps.wiki.outcome }}"
            [press]="${{ steps.press.outcome }}"
            [boutiques]="${{ steps.boutiques.outcome }}"
            [sentiment]="${{ steps.sentiment.outcome }}"
            [resale]="${{ steps.resale.outcome }}"
            [forecast]="${{ steps.forecast.outcome }}"
          )
          failed=()
          for name in "${!OUTCOMES[@]}"; do
            [ "${OUTCOMES[$name]}" = "failure" ] && failed+=("$name")
          done
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" \
            --search "Nightly pipeline failing in:title" --state open \
            --json number --jq '.[0].number')
          # jq prints the JSON literal "null" (a non-empty string!) when no
          # issue matches — treat that the same as "none found".
          [ "$existing" = "null" ] && existing=""

          if [ ${#failed[@]} -eq 0 ]; then
            if [ -n "$existing" ]; then
              gh issue close "$existing" --repo "${{ github.repository }}" \
                --comment "Back to green: $run_url"
            fi
          else
            body="Stage(s) raised beyond their own best-effort error handling tonight: **${failed[*]}**.

          That means an actual bug, not just a quiet best-effort skip (those already log and move on). Worth a look: $run_url"
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
            else
              gh issue create --repo "${{ github.repository }}" \
                --title "Nightly pipeline failing" --body "$body"
            fi
          fi

# trigger: verifying deadstock-only eBay asks
